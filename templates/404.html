{% extends 'base.html' %}

{% block title %}Page Not Found | Bahi Hata{% endblock %}

{% block content %}
<section class="shelf-section" style="padding: 100px 20px; text-align: center; min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <h1 style="font-family: var(--font-display); font-size: 80px; color: var(--terracotta); margin-bottom: 20px;">404</h1>
    <h2 style="font-family: var(--font-display); font-size: 32px; color: var(--ink); margin-bottom: 16px;">The Story Ends Here</h2>
    <p style="font-family: var(--font-body); font-size: 16px; color: var(--ink-soft); max-width: 500px; margin-bottom: 40px; line-height: 1.6;">
        It looks like that page has wandered off into the archives. Don't worry, the bazaar is vast. Let's get you back to the lively stalls.
    </p>
    <a href="{% url 'core:home' %}" class="btn-primary" style="padding: 14px 32px; border-radius: 8px; font-size: 15px; background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta)); color: white; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-weight: 700;">
        Back to the Hata →
    </a>
</section>
{% endblock %}
